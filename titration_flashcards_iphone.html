<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Titration Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 2rem; color: #1a1a1a; }
  h1 { font-size: 19px; font-weight: 600; margin-bottom: 0.2rem; }
  .subtitle { font-size: 12px; color: #999; margin-bottom: 1.25rem; }
  .topic-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 1rem; width: 100%; max-width: 420px; }
  .topic-btn { padding: 6px 13px; border-radius: 20px; border: 1px solid #ddd; background: white; color: #666; font-size: 12px; cursor: pointer; }
  .topic-btn.active { background: #e8f0fe; color: #1a56db; border-color: #a8c0f7; }
  .progress { font-size: 13px; color: #999; text-align: center; margin-bottom: 0.3rem; }
  .hint { font-size: 12px; color: #ccc; text-align: center; margin-bottom: 1rem; }
  .card-scene { perspective: 1000px; width: 100%; max-width: 420px; height: 260px; cursor: pointer; user-select: none; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s ease; }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 18px; border: 1px solid #e5e5e5; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem 1.25rem; text-align: center; background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card-back { transform: rotateY(180deg); background: #fafaf7; }
  .q-label { font-size: 10px; font-weight: 600; color: #ccc; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
  .q-text { font-size: 17px; font-weight: 600; line-height: 1.4; }
  .a-text { font-size: 15px; line-height: 1.65; color: #222; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 1.25rem; width: 100%; max-width: 420px; }
  .btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: white; color: #1a1a1a; font-size: 15px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .btn:active { background: #f0f0ec; transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; }
  .shuffle-btn { background: #1a56db; color: white; border-color: #1a56db; }
  .shuffle-btn:active { background: #1444b8; }
  .footer { margin-top: 2rem; font-size: 11px; color: #ccc; }
</style>
</head>
<body>

<h1>Titration Flashcards</h1>
<p class="subtitle">BTEC Level 3 Applied Science — Unit 5</p>

<div class="topic-row" id="topicRow"></div>
<div class="progress" id="progress"></div>
<div class="hint" id="hint">Tap card to flip</div>

<div class="card-scene" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face">
      <div class="q-label">Question</div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="card-face card-back">
      <div class="q-label">Answer</div>
      <div class="a-text" id="aText"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn" id="prevBtn" onclick="navigate(-1)">← Prev</button>
  <button class="btn shuffle-btn" onclick="shuffle()">Shuffle</button>
  <button class="btn" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>

<p class="footer">20 cards · good luck 💙</p>

<script>
const allCards = [
  {topic:"Equipment", q:"What is a burette used for in titration?", a:"To hold the titrant and deliver precise, measurable volumes. Read to the nearest 0.05 cm³."},
  {topic:"Equipment", q:"Why must the burette be rinsed with the titrant before use?", a:"To prevent dilution — rinsing with water would lower the concentration of the titrant and give inaccurate results."},
  {topic:"Equipment", q:"Why is a white tile placed under the conical flask?", a:"To make it easier to see the colour change at the endpoint, giving a clear contrast against the solution."},
  {topic:"Equipment", q:"What is a pipette filler used for?", a:"To safely draw solution into the pipette without using your mouth. Ensures accurate fixed volumes are measured."},
  {topic:"Technique", q:"What are concordant results?", a:"Titre values that agree within 0.10 cm³ of each other. At least two concordant results are needed to calculate a reliable mean."},
  {topic:"Technique", q:"What is the difference between the end point and the equivalence point?", a:"The equivalence point is when moles of acid = moles of base (theoretical). The end point is the observed colour change — ideally they coincide."},
  {topic:"Technique", q:"How do you calculate the titre?", a:"Titre = final burette reading − initial burette reading. Units are cm³."},
  {topic:"Technique", q:"Why is the rough titre not included in the mean?", a:"The rough titration is done quickly to get an approximate endpoint. It may overshoot, so it is less accurate than subsequent careful titrations."},
  {topic:"Technique", q:"Why should you add titrant dropwise near the endpoint?", a:"To avoid overshooting the endpoint. One excess drop can change the colour permanently past the equivalence point."},
  {topic:"Calculations", q:"What is the formula linking moles, concentration and volume?", a:"Moles = Concentration (mol/dm³) × Volume (dm³). Remember to convert cm³ to dm³ by dividing by 1000."},
  {topic:"Calculations", q:"How do you use the mole ratio in a titration calculation?", a:"Use the balanced equation to find the ratio of moles of acid to base. Scale the known moles to find the unknown, then calculate concentration."},
  {topic:"Calculations", q:"How do you calculate percentage error for a burette?", a:"% error = (uncertainty / measurement) × 100. Burette uncertainty is ±0.05 cm³ per reading, so ±0.10 cm³ per titre."},
  {topic:"Calculations", q:"A titre of 24.70 cm³ of 0.10 mol/dm³ NaOH neutralises HCl. What are the moles of NaOH?", a:"Moles = 0.10 × (24.70/1000) = 0.00247 mol. Since NaOH:HCl is 1:1, moles of HCl = 0.00247 mol."},
  {topic:"Indicators", q:"What indicator is used for strong acid–strong base titrations?", a:"Either phenolphthalein or methyl orange can be used. Both give a sharp colour change at the equivalence point."},
  {topic:"Indicators", q:"What colour change does phenolphthalein show at the endpoint?", a:"Colourless → pink (one drop excess alkali). Used when the base is in the burette."},
  {topic:"Indicators", q:"What colour change does methyl orange show at the endpoint?", a:"Red (in acid) → orange/yellow (in alkali). The endpoint is the first permanent orange colour."},
  {topic:"Indicators", q:"Why is KMnO₄ (potassium manganate VII) self-indicating?", a:"It is intensely purple. In a redox titration it is decolourised by the reducing agent. The endpoint is the first permanent pink/purple colour."},
  {topic:"Errors", q:"Name two sources of error in a titration.", a:"Parallax error when reading the burette meniscus; not rinsing glassware correctly; not reading the bottom of the meniscus; overshooting the endpoint."},
  {topic:"Errors", q:"How do you read the meniscus correctly in a burette?", a:"Read the bottom of the meniscus at eye level. Viewing from above or below introduces parallax error."},
  {topic:"Errors", q:"What effect does over-rinsing the conical flask with water have?", a:"None on the result — the number of moles of analyte stays the same. Volume of solvent does not affect mole calculations."},
];

let deck = [...allCards];
let topics = ["All", ...new Set(allCards.map(c => c.topic))];
let currentTopic = "All";
let idx = 0;
let isFlipped = false;

function getFiltered() {
  return currentTopic === "All" ? deck : deck.filter(c => c.topic === currentTopic);
}

function render() {
  const cards = getFiltered();
  if (!cards.length) return;
  const c = cards[idx];
  document.getElementById("qText").textContent = c.q;
  document.getElementById("aText").textContent = c.a;
  document.getElementById("progress").textContent = "Card " + (idx + 1) + " of " + cards.length + "  ·  " + c.topic;
  document.getElementById("prevBtn").disabled = idx === 0;
  document.getElementById("nextBtn").disabled = idx === cards.length - 1;
  isFlipped = false;
  document.getElementById("cardInner").classList.remove("flipped");
  document.getElementById("hint").textContent = "Tap card to flip";
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById("cardInner").classList.toggle("flipped", isFlipped);
  document.getElementById("hint").textContent = isFlipped ? "Tap again to go back" : "Tap card to flip";
}

function navigate(dir) {
  const cards = getFiltered();
  idx = Math.max(0, Math.min(cards.length - 1, idx + dir));
  render();
}

function shuffle() {
  deck.sort(() => Math.random() - 0.5);
  idx = 0;
  render();
}

function setTopic(t) {
  currentTopic = t;
  idx = 0;
  document.querySelectorAll(".topic-btn").forEach(b => b.classList.toggle("active", b.dataset.t === t));
  render();
}

const row = document.getElementById("topicRow");
topics.forEach(t => {
  const b = document.createElement("button");
  b.className = "topic-btn" + (t === "All" ? " active" : "");
  b.textContent = t;
  b.dataset.t = t;
  b.onclick = () => setTopic(t);
  row.appendChild(b);
});

render();
</script>
</body>
</html>
